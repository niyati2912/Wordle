<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wordle Clone</title>


<link rel="stylesheet" href="style.css" />
</head>

<body>

<header>
<h1>WORDLE</h1>
</header>

<div id="message-container" aria-live="polite"></div>

<main>


<section id="game-board" aria-label="Wordle game board">

    

    <!-- Row 0 -->
    <div class="tile-row" data-row="0">
    
    <div class="tile" data-row="0" data-index="0"></div>
    <div class="tile" data-row="0" data-index="1"></div>
    <div class="tile" data-row="0" data-index="2"></div>
    <div class="tile" data-row="0" data-index="3"></div>
    <div class="tile" data-row="0" data-index="4"></div>
    </div>

    <!-- Row 1 -->
    <div class="tile-row" data-row="1">
    <div class="tile" data-row="1" data-index="0"></div>
    <div class="tile" data-row="1" data-index="1"></div>
    <div class="tile" data-row="1" data-index="2"></div>
    <div class="tile" data-row="1" data-index="3"></div>
    <div class="tile" data-row="1" data-index="4"></div>
    </div>

    <!-- Row 2 -->
    <div class="tile-row" data-row="2">
    <div class="tile" data-row="2" data-index="0"></div>
    <div class="tile" data-row="2" data-index="1"></div>
    <div class="tile" data-row="2" data-index="2"></div>
    <div class="tile" data-row="2" data-index="3"></div>
    <div class="tile" data-row="2" data-index="4"></div>
    </div>

    <!-- Row 3 -->
    <div class="tile-row" data-row="3">
    <div class="tile" data-row="3" data-index="0"></div>
    <div class="tile" data-row="3" data-index="1"></div>
    <div class="tile" data-row="3" data-index="2"></div>
    <div class="tile" data-row="3" data-index="3"></div>
    <div class="tile" data-row="3" data-index="4"></div>
    </div>

    <!-- Row 4 -->
    <div class="tile-row" data-row="4">
    <div class="tile" data-row="4" data-index="0"></div>
    <div class="tile" data-row="4" data-index="1"></div>
    <div class="tile" data-row="4" data-index="2"></div>
    <div class="tile" data-row="4" data-index="3"></div>
    <div class="tile" data-row="4" data-index="4"></div>
    </div>

    <!-- Row 5 -->
    <div class="tile-row" data-row="5">
    <div class="tile" data-row="5" data-index="0"></div>
    <div class="tile" data-row="5" data-index="1"></div>
    <div class="tile" data-row="5" data-index="2"></div>
    <div class="tile" data-row="5" data-index="3"></div>
    <div class="tile" data-row="5" data-index="4"></div>
    </div>

</section>
<!-- end #game-board -->

</main>

<section id="keyboard" aria-label="On-screen keyboard">

<!-- Top row: Q W E R T Y U I O P -->
<div class="key-row">
 
    <button class="key" data-key="Q" aria-label="Q">Q</button>
    <button class="key" data-key="W" aria-label="W">W</button>
    <button class="key" data-key="E" aria-label="E">E</button>
    <button class="key" data-key="R" aria-label="R">R</button>
    <button class="key" data-key="T" aria-label="T">T</button>
    <button class="key" data-key="Y" aria-label="Y">Y</button>
    <button class="key" data-key="U" aria-label="U">U</button>
    <button class="key" data-key="I" aria-label="I">I</button>
    <button class="key" data-key="O" aria-label="O">O</button>
    <button class="key" data-key="P" aria-label="P">P</button>
</div>

<!-- Middle row: A S D F G H J K L -->
<div class="key-row">
    <button class="key" data-key="A" aria-label="A">A</button>
    <button class="key" data-key="S" aria-label="S">S</button>
    <button class="key" data-key="D" aria-label="D">D</button>
    <button class="key" data-key="F" aria-label="F">F</button>
    <button class="key" data-key="G" aria-label="G">G</button>
    <button class="key" data-key="H" aria-label="H">H</button>
    <button class="key" data-key="J" aria-label="J">J</button>
    <button class="key" data-key="K" aria-label="K">K</button>
    <button class="key" data-key="L" aria-label="L">L</button>
</div>

<!-- Bottom row: Enter Z X C V B N M Backspace -->
<div class="key-row">

    <button class="key key--wide" data-key="Enter" aria-label="Enter">Enter</button>
    <button class="key" data-key="Z" aria-label="Z">Z</button>
    <button class="key" data-key="X" aria-label="X">X</button>
    <button class="key" data-key="C" aria-label="C">C</button>
    <button class="key" data-key="V" aria-label="V">V</button>
    <button class="key" data-key="B" aria-label="B">B</button>
    <button class="key" data-key="N" aria-label="N">N</button>
    <button class="key" data-key="M" aria-label="M">M</button>
    <button class="key key--wide" data-key="Backspace" aria-label="Backspace">⌫</button>
</div>

</section>


<script src="game.js"></script>

</body>
</html>
